<script>
  restoreLastPageIfLaunchedAsApp();

  const params = new URLSearchParams(location.search);
  const cat = params.get('cat') || '';
  const q = (params.get('q') || '').trim();
  const city = params.get('city') || '';

  const SEO_BY_CAT = {
    realestate: {
      title: 'عقارات للبيع والإيجار في سوريا من المالك | ساحة',
      desc: 'تصفح إعلانات عقارات للبيع والإيجار في سوريا: شقق، بيوت، أراضي ومحلات، معظمها من المالك مباشرة بدون وسيط. انشر إعلان عقارك مجاناً على ساحة.',
      h1: 'عقارات للبيع والإيجار في سوريا',
    },
    cars: {
      title: 'سيارات للبيع في سوريا | ساحة',
      desc: 'تصفح إعلانات سيارات للبيع في سوريا من أصحابها مباشرة. سيارات جديدة ومستعملة بكل الماركات والمحافظات، وانشر إعلان سيارتك مجاناً على ساحة.',
      h1: 'سيارات للبيع في سوريا',
    },
    misc: {
      title: 'إعلانات متنوعة للبيع في سوريا | ساحة',
      desc: 'تصفح إعلانات متنوعة للبيع في سوريا: أثاث، إلكترونيات، وأغراض شخصية. منصة إعلانات مبوبة مجانية، انشر إعلانك خلال دقائق.',
      h1: 'إعلانات متنوعة للبيع في سوريا',
    },
  };

  (function applySeoTags(){
    const canonicalLink = document.getElementById('canonicalLink');
    const heading = document.getElementById('pageHeading');
    if(q){
      document.title = `نتائج البحث عن "${q}" | ساحة`;
      heading.textContent = `نتائج البحث عن "${q}"`;
      canonicalLink.href = cat ? `https://saaha.net/?cat=${encodeURIComponent(cat)}` : 'https://saaha.net/';
    }else if(cat && SEO_BY_CAT[cat]){
      const seo = SEO_BY_CAT[cat];
      document.title = seo.title;
      document.querySelector('meta[name="description"]').setAttribute('content', seo.desc);
      document.querySelector('meta[property="og:title"]').setAttribute('content', seo.title);
      document.querySelector('meta[property="og:description"]').setAttribute('content', seo.desc);
      heading.textContent = city ? `${seo.h1} - ${city}` : seo.h1;
      canonicalLink.href = `https://saaha.net/?cat=${encodeURIComponent(cat)}`;
    }else if(city){
      heading.textContent = `أحدث الإعلانات المبوبة في ${city}`;
      canonicalLink.href = 'https://saaha.net/';
    }
  })();

  (async()=>{
    await renderHeader(cat);
    renderFooter();
    renderMobileNav('home');
    renderFeaturedSidebar();
  })();

  if(cat) trackFilterEvent('category', cat);
  if(q) trackFilterEvent('search', q);
  if(city) trackFilterEvent('city', city);

  async function loadFeed(){
    try{ await loadFavorites(); }
    catch(e){ console.error('loadFavorites failed:', e); }

    const feed = document.getElementById('feed');
    const empty = document.getElementById('emptyState');
    const info = document.getElementById('resultsInfo');

    let ads;
    try{
      ads = await getActiveAds();
    }catch(e){
      console.error('loadFeed failed:', e);
      feed.style.display = 'none';
      empty.style.display = 'block';
      document.getElementById('emptyTitle').textContent = 'تعذّر تحميل الإعلانات';
      document.getElementById('emptyText').innerHTML = 'تحقق من اتصالك بالإنترنت وحاول مجدداً. <button type="button" class="btn btn-primary" style="margin-top:10px;display:inline-flex;" onclick="location.reload()">إعادة المحاولة</button>';
      return;
    }

    if(cat) ads = ads.filter(a=>a.category===cat);
    if(city) ads = ads.filter(a=> (a.city||'').includes(city));
    if(q){
      const needle = q.toLowerCase();
      ads = ads.filter(a=> (a.title+a.description+a.city).toLowerCase().includes(needle));
    }

    if(cat || q || city){
      info.style.display='block';
      const label = cat ? (CATEGORY_LABELS[cat] || '') : '';
      info.textContent = `${ads.length} نتيجة`
        + (label ? ` في «${label}»` : '')
        + (city ? ` في مدينة «${city}»` : '')
        + (q ? ` لكلمة «${q}»` : '');
    }

    if(ads.length===0){
      feed.style.display='none';
      empty.style.display='block';
      if(!cat && !q && !city){
        document.getElementById('emptyTitle').textContent = 'لا توجد إعلانات بعد';
        document.getElementById('emptyText').innerHTML = 'كن أول من ينشر إعلاناً على ساحة. <a class="btn btn-primary" style="margin-top:10px;display:inline-flex;" href="' + addAdHref() + '">أضف إعلانك</a>';
      } else {
        document.getElementById('emptyTitle').textContent = 'لا توجد إعلانات مطابقة';
        document.getElementById('emptyText').textContent = 'جرّب تعديل كلمة البحث أو اختيار تصنيف آخر.';
      }
    }else{
      feed.style.display='flex';
      empty.style.display='none';
      feed.innerHTML = ads.map(adCardHTML).join('');
    }
  }
  loadFeed();

  // fill the search input with current query for convenience
  const si = document.getElementById('searchInput');
  if(si && q) si.value = q;
</script>
