<script>
  restoreLastPageIfLaunchedAsApp();

  const params = new URLSearchParams(location.search);
  const cat = params.get('cat') || '';
  const q = (params.get('q') || '').trim();
  const city = params.get('city') || '';

  const SEO_BY_CAT = {
    realestate: {
      noun: 'عقارات',
      title: 'عقارات للبيع والإيجار في سوريا من المالك | ساحة',
      desc: 'تصفح إعلانات عقارات للبيع والإيجار في سوريا: شقق، بيوت، أراضي ومحلات، معظمها من المالك مباشرة بدون وسيط. انشر إعلان عقارك مجاناً على ساحة.',
      h1: 'عروض عقارات بدون وسيط: بيع وشراء وتأجير في سوريا',
      h1City: city => `عروض عقارات بدون وسيط في ${city}: بيع وشراء وتأجير`,
    },
    cars: {
      noun: 'سيارات',
      title: 'سيارات للبيع في سوريا | ساحة',
      desc: 'تصفح إعلانات سيارات للبيع في سوريا من أصحابها مباشرة. سيارات جديدة ومستعملة بكل الماركات والمحافظات، وانشر إعلان سيارتك مجاناً على ساحة.',
      h1: 'عروض سيارات: بيع وشراء جديد ومستعمل في سوريا',
      h1City: city => `عروض سيارات في ${city}: بيع وشراء جديد ومستعمل`,
    },
    mobiles: {
      noun: 'موبايلات',
      title: 'موبايلات للبيع في سوريا: سامسونج، هواوي، آيفون | ساحة',
      desc: 'تصفح إعلانات موبايلات مستعملة وجديدة للبيع في سوريا: سامسونج، هواوي، آيفون وكل الماركات، بأفضل الأسعار. انشر إعلان موبايلك مجاناً على ساحة.',
      h1: 'عروض موبايلات: سامسونج وهواوي وآيفون بيع وشراء جديد ومستعمل',
      h1City: city => `عروض موبايلات في ${city}: بيع وشراء جديد ومستعمل`,
    },
    furniture: {
      noun: 'أثاث',
      title: 'أثاث مستعمل وجديد للبيع في سوريا | ساحة',
      desc: 'تصفح إعلانات أثاث مستعمل وجديد للبيع في سوريا: غرف نوم، صالونات، مطابخ وأثاث منزلي ومكتبي من أصحابه مباشرة. انشر إعلانك مجاناً على ساحة.',
      h1: 'عروض أثاث: بيع وشراء جديد ومستعمل في سوريا',
      h1City: city => `عروض أثاث في ${city}: بيع وشراء جديد ومستعمل`,
    },
    electronics: {
      noun: 'إلكترونيات',
      title: 'إلكترونيات وكمبيوترات للبيع في سوريا | ساحة',
      desc: 'تصفح إعلانات إلكترونيات وأجهزة منزلية وكمبيوترات ولابتوبات للبيع في سوريا، جديد ومستعمل بأفضل الأسعار. انشر إعلانك مجاناً على ساحة.',
      h1: 'عروض إلكترونيات: أجهزة منزلية وكمبيوترات ولابتوبات بيع وشراء جديد ومستعمل',
      h1City: city => `عروض إلكترونيات في ${city}: كمبيوترات ولابتوبات وأجهزة منزلية بيع وشراء`,
    },
    misc: {
      noun: 'إعلانات متنوعة',
      title: 'إعلانات متنوعة للبيع في سوريا | ساحة',
      desc: 'تصفح إعلانات متنوعة للبيع في سوريا: ملابس، أدوات، وأغراض شخصية متفرقة. منصة إعلانات مبوبة مجانية، انشر إعلانك خلال دقائق.',
      h1: 'عروض متنوعة: بيع وشراء جديد ومستعمل في سوريا',
      h1City: city => `عروض متنوعة في ${city}: بيع وشراء جديد ومستعمل`,
    },
  };

  (function applySeoTags(){
    const canonicalLink = document.getElementById('canonicalLink');
    const heading = document.getElementById('pageHeading');
    const descTag = document.querySelector('meta[name="description"]');
    const ogTitleTag = document.querySelector('meta[property="og:title"]');
    const ogDescTag = document.querySelector('meta[property="og:description"]');

    if(q){
      document.title = `نتائج البحث عن "${q}" | ساحة`;
      heading.textContent = `نتائج البحث عن "${q}"`;
      canonicalLink.href = cat ? `https://saaha.net/?cat=${encodeURIComponent(cat)}` : 'https://saaha.net/';
    }else if(cat && SEO_BY_CAT[cat] && city){
      const seo = SEO_BY_CAT[cat];
      const title = `${seo.noun} للبيع في ${city} | ساحة`;
      const desc = `تصفح أحدث إعلانات ${seo.noun} للبيع في ${city}، سوريا. ${seo.desc}`;
      document.title = title;
      descTag.setAttribute('content', desc);
      ogTitleTag.setAttribute('content', title);
      ogDescTag.setAttribute('content', desc);
      heading.textContent = seo.h1City(city);
      canonicalLink.href = `https://saaha.net/?cat=${encodeURIComponent(cat)}&city=${encodeURIComponent(city)}`;
    }else if(cat && SEO_BY_CAT[cat]){
      const seo = SEO_BY_CAT[cat];
      document.title = seo.title;
      descTag.setAttribute('content', seo.desc);
      ogTitleTag.setAttribute('content', seo.title);
      ogDescTag.setAttribute('content', seo.desc);
      heading.textContent = seo.h1;
      canonicalLink.href = `https://saaha.net/?cat=${encodeURIComponent(cat)}`;
    }else if(city){
      const title = `أحدث الإعلانات المبوبة في ${city} | ساحة`;
      const desc = `تصفح أحدث الإعلانات المبوبة في ${city}: عقارات، سيارات وإعلانات متنوعة. انشر إعلانك مجاناً على ساحة.`;
      document.title = title;
      descTag.setAttribute('content', desc);
      ogTitleTag.setAttribute('content', title);
      ogDescTag.setAttribute('content', desc);
      heading.textContent = `عروض إعلانات في ${city}: بيع وشراء جديد ومستعمل`;
      canonicalLink.href = `https://saaha.net/?city=${encodeURIComponent(city)}`;
    }
  })();

  (async()=>{
    await renderHeader(cat);
    renderFooter();
    renderMobileNav('home');
    renderFeaturedSidebar();
  })();

  if(cat) trackFilterEvent('category', cat);
  if(q) trackFilterEvent('search', q);
  if(city) trackFilterEvent('city', city);

  async function loadFeed(){
    try{ await loadFavorites(); }
    catch(e){ console.error('loadFavorites failed:', e); }

    const feed = document.getElementById('feed');
    const empty = document.getElementById('emptyState');
    const info = document.getElementById('resultsInfo');

    let ads;
    try{
      ads = await getActiveAds();
    }catch(e){
      console.error('loadFeed failed:', e);
      feed.style.display = 'none';
      empty.style.display = 'block';
      document.getElementById('emptyTitle').textContent = 'تعذّر تحميل الإعلانات';
      document.getElementById('emptyText').innerHTML = 'تحقق من اتصالك بالإنترنت وحاول مجدداً. <button type="button" class="btn btn-primary" style="margin-top:10px;display:inline-flex;" onclick="location.reload()">إعادة المحاولة</button>';
      return;
    }

    if(cat) ads = ads.filter(a=>a.category===cat);
    if(city) ads = ads.filter(a=> (a.city||'').includes(city));
    if(q){
      const needle = q.toLowerCase();
      ads = ads.filter(a=> (a.title+a.description+a.city).toLowerCase().includes(needle));
    }

    if(cat || q || city){
      info.style.display='block';
      const label = cat ? (CATEGORY_LABELS[cat] || '') : '';
      info.textContent = `${ads.length} نتيجة`
        + (label ? ` في «${label}»` : '')
        + (city ? ` في مدينة «${city}»` : '')
        + (q ? ` لكلمة «${q}»` : '');
    }

    if(ads.length===0){
      feed.style.display='none';
      empty.style.display='block';
      if(!cat && !q && !city){
        document.getElementById('emptyTitle').textContent = 'لا توجد إعلانات بعد';
        document.getElementById('emptyText').innerHTML = 'كن أول من ينشر إعلاناً على ساحة. <a class="btn btn-primary" style="margin-top:10px;display:inline-flex;" href="' + addAdHref() + '">أضف إعلانك</a>';
      } else {
        document.getElementById('emptyTitle').textContent = 'لا توجد إعلانات مطابقة';
        document.getElementById('emptyText').textContent = 'جرّب تعديل كلمة البحث أو اختيار تصنيف آخر.';
      }
    }else{
      feed.style.display='flex';
      empty.style.display='none';
      feed.innerHTML = ads.map(adCardHTML).join('');
    }
  }
  loadFeed();

  // fill the search input with current query for convenience
  const si = document.getElementById('searchInput');
  if(si && q) si.value = q;
</script>
