<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعيين كلمة مرور جديدة | ساحة</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#15264a">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ساحة">
</head>
<body>

<div id="site-header"></div>

<main class="page-body">
  <div class="auth-wrap panel">
    <h2 class="panel-title" style="margin-bottom:6px;">تعيين كلمة مرور جديدة</h2>
    <p style="color:var(--muted);font-size:13.5px;margin:0 0 18px;" id="introText">اكتب كلمة مرور جديدة لحسابك.</p>

    <div id="errorBox" style="display:none;background:#fdeceb;color:var(--danger);border:1px solid #f5c6c2;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;margin-bottom:16px;"></div>

    <form id="resetForm">
      <div class="field full">
        <label for="newPassInput">كلمة المرور الجديدة</label>
        <input type="password" id="newPassInput" placeholder="••••••••" minlength="6" required>
      </div>
      <div class="field full">
        <label for="confirmPassInput">تأكيد كلمة المرور</label>
        <input type="password" id="confirmPassInput" placeholder="••••••••" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="resetSubmit">حفظ كلمة المرور الجديدة</button>
    </form>
  </div>
</main>

<div id="site-footer"></div>
<div id="mobile-nav"></div>

<script src="js/vendor/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
  (async()=>{
    await renderHeader('');
    renderFooter();
    renderMobileNav('');
  })();

  const errorBox = document.getElementById('errorBox');
  function showError(msg){
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  let canReset = false;
  sb.auth.onAuthStateChange((event)=>{
    if(event === 'PASSWORD_RECOVERY') canReset = true;
  });
  // if the recovery link already resolved before this listener attached
  sb.auth.getSession().then(({ data })=>{
    if(data.session) canReset = true;
  });

  document.getElementById('resetForm').addEventListener('submit', async e=>{
    e.preventDefault();
    errorBox.style.display = 'none';

    const pass = document.getElementById('newPassInput').value;
    const confirm = document.getElementById('confirmPassInput').value;

    if(!canReset){
      showError('رابط الاستعادة غير صالح أو منتهي الصلاحية. اطلب رابطاً جديداً من صفحة استعادة كلمة المرور.');
      return;
    }
    if(pass.length < 6){
      showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
      return;
    }
    if(pass !== confirm){
      showError('كلمتا المرور غير متطابقتين');
      return;
    }

    const submitBtn = document.getElementById('resetSubmit');
    submitBtn.disabled = true;
    const { error } = await sb.auth.updateUser({ password: pass });
    submitBtn.disabled = false;

    if(error){
      showError('تعذّر حفظ كلمة المرور، حاول مجدداً');
      return;
    }
    toast('تم تغيير كلمة المرور بنجاح');
    setTimeout(()=> location.href = 'index.html', 900);
  });
</script>
</body>
</html>
