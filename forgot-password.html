<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة المرور | ساحة</title>
<meta name="description" content="استعد كلمة مرور حسابك على ساحة عبر بريدك الإلكتروني.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#15264a">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ساحة">
</head>
<body>

<div id="site-header"></div>

<main class="page-body">
  <div class="auth-wrap panel">
    <h2 class="panel-title" style="margin-bottom:4px;">استعادة كلمة المرور</h2>
    <p style="color:var(--muted);font-size:13.5px;margin:0 0 18px;">
      اكتب بريدك الإلكتروني المسجّل وسنرسل لك رابط لتعيين كلمة مرور جديدة.
    </p>

    <div id="fpMessageBox" style="display:none;position:relative;padding:12px 42px 12px 14px;border-radius:10px;font-size:13.5px;font-weight:600;margin-bottom:16px;line-height:1.7;">
      <span id="fpMessageText"></span>
      <button type="button" id="fpMessageClose" aria-label="إغلاق" style="position:absolute;left:8px;top:8px;width:26px;height:26px;border:none;background:rgba(0,0,0,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:inherit;font-size:14px;line-height:1;">✕</button>
    </div>

    <form id="forgotForm">
      <div class="field full">
        <label for="fpEmailInput">البريد الإلكتروني</label>
        <input type="email" id="fpEmailInput" placeholder="example@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="fpSubmitBtn">إرسال رابط الاستعادة</button>
    </form>

    <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:16px;">
      تذكرت كلمة مرورك؟ <a href="#" id="backToLoginLink" style="color:var(--primary);font-weight:700;">رجوع لتسجيل الدخول</a>
    </p>
  </div>
</main>

<div id="site-footer"></div>
<div id="mobile-nav"></div>

<script src="js/vendor/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
  (async()=>{
    await renderHeader('');
    renderFooter();
    renderMobileNav('');
  })();

  const loginHref = 'login.html' + location.search;
  document.getElementById('backToLoginLink').setAttribute('href', loginHref);

  const messageBox = document.getElementById('fpMessageBox');
  const messageText = document.getElementById('fpMessageText');
  function hideMessage(){ messageBox.style.display = 'none'; }
  function showMessage(text, kind){
    messageText.textContent = text;
    messageBox.style.background = kind === 'error' ? '#fdeceb' : '#e8f7f0';
    messageBox.style.color = kind === 'error' ? 'var(--danger)' : 'var(--success)';
    messageBox.style.border = '1px solid ' + (kind === 'error' ? '#f5c6c2' : '#b8e6d0');
    messageBox.style.display = 'block';
  }
  document.getElementById('fpMessageClose').addEventListener('click', hideMessage);

  function isValidEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  const submitBtn = document.getElementById('fpSubmitBtn');
  document.getElementById('forgotForm').addEventListener('submit', async e=>{
    e.preventDefault();
    hideMessage();
    const email = document.getElementById('fpEmailInput').value.trim();
    if(!email || !isValidEmail(email)){
      showMessage('الرجاء إدخال بريد إلكتروني صحيح', 'error');
      return;
    }
    submitBtn.disabled = true;
    try{
      await sendPasswordReset(email);
      showMessage('تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني — افتحه واضغط الرابط لتعيين كلمة مرور جديدة.', 'success');
    }catch(err){
      showMessage('تعذّر إرسال رابط الاستعادة، تحقق من البريد وحاول مجدداً', 'error');
    }
    submitBtn.disabled = false;
  });
</script>
</body>
</html>
