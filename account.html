<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي | ساحة</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#15264a">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ساحة">
</head>
<body>

<div id="site-header"></div>

<main class="page-body">
  <div class="container">

    <section class="panel" style="display:flex;align-items:center;gap:18px;margin-bottom:20px;">
      <div style="position:relative;flex-shrink:0;">
        <img id="avatarImg" style="width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--bg);">
        <button id="avatarBtn" type="button" title="تغيير الصورة" style="position:absolute;bottom:-2px;left:-2px;width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3l2-2h6l2 2h3v13H4Z"/><circle cx="12" cy="13" r="3.5"/></svg>
        </button>
        <input type="file" id="avatarInput" accept="image/*" hidden>
      </div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="font-weight:800;font-size:17px;" id="accountName"></div>
          <button type="button" id="editNameBtn" title="تغيير الاسم" style="width:26px;height:26px;border-radius:50%;background:var(--bg);border:none;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </div>
        <div id="editNameRow" style="display:none;align-items:center;gap:8px;margin-top:6px;">
          <input type="text" id="editNameInput" maxlength="60" style="flex:1;max-width:260px;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:14px;">
          <button type="button" id="saveNameBtn" class="btn btn-primary" style="padding:8px 16px;font-size:13px;">حفظ</button>
          <button type="button" id="cancelNameBtn" class="btn btn-outline" style="padding:8px 16px;font-size:13px;">إلغاء</button>
        </div>
        <div style="color:var(--muted);font-size:13px;margin-top:2px;" id="accountHint">هذا الاسم والصورة يظهران للمهتمين بإعلاناتك</div>
      </div>
      <button type="button" id="logoutBtn" class="btn btn-outline" style="color:var(--danger);border-color:var(--danger);flex-shrink:0;">تسجيل الخروج</button>
    </section>

    <section class="panel" id="accountSettingsPanel" style="display:none;margin-bottom:20px;">
      <h2 class="panel-title">إعدادات الحساب</h2>
      <div class="form-grid">
        <div class="field">
          <label for="settingsEmailInput">البريد الإلكتروني</label>
          <div style="display:flex;gap:8px;">
            <input type="email" id="settingsEmailInput" style="flex:1;">
            <button type="button" id="saveEmailBtn" class="btn btn-outline" style="flex-shrink:0;">حفظ</button>
          </div>
          <p class="field-hint">تغيير البريد بيحتاج تأكيد من بريدك الجديد أحياناً حسب إعدادات الحساب.</p>
        </div>
        <div class="field">
          <label for="settingsPassInput">كلمة مرور جديدة</label>
          <div style="display:flex;gap:8px;">
            <input type="password" id="settingsPassInput" placeholder="اتركها فارغة إن لم ترغب بالتغيير" minlength="6" style="flex:1;">
            <button type="button" id="savePassBtn" class="btn btn-outline" style="flex-shrink:0;">حفظ</button>
          </div>
        </div>
      </div>
    </section>

    <div class="layout">
      <section>
        <div class="panel" style="margin-bottom:20px;">
          <h2 class="panel-title">إعلاناتي</h2>
          <div class="feed" id="myAds"></div>
        </div>
        <div class="panel">
          <h2 class="panel-title">المفضلة</h2>
          <div class="feed" id="favAds"></div>
        </div>
      </section>

      <aside class="panel sidebar-panel">
        <h2 class="panel-title">إعلانات مميزة</h2>
        <div class="featured-list" id="featuredList"></div>
      </aside>
    </div>
  </div>
</main>

<div id="site-footer"></div>
<div id="mobile-nav"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
(async function main(){
  const user = await getCurrentUser();
  if(!user){
    location.href = 'login.html?redirect=' + encodeURIComponent('account.html');
    return;
  }

  await renderHeader('');
  renderFooter();
  renderMobileNav('account');
  renderFeaturedSidebar();
  await loadFavorites();

  const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72"><rect width="72" height="72" fill="#e8eaf0"/><circle cx="36" cy="28" r="14" fill="#b9c0cf"/><path d="M10 64c4-14 16-22 26-22s22 8 26 22" fill="#b9c0cf"/></svg>'
  );
  document.getElementById('accountName').textContent = user.name;
  document.getElementById('avatarImg').src = user.avatar || DEFAULT_AVATAR;

  // email + password settings only make sense for a real email account,
  // not a guest (anonymous) session which has no email/password to change
  if(user.email && !user.isAnonymous){
    const settingsPanel = document.getElementById('accountSettingsPanel');
    settingsPanel.style.display = 'block';
    document.getElementById('settingsEmailInput').value = user.email;

    document.getElementById('saveEmailBtn').addEventListener('click', async ()=>{
      const newEmail = document.getElementById('settingsEmailInput').value.trim();
      if(!newEmail || newEmail === user.email) return;
      try{
        await updateAccountEmail(newEmail);
        toast('تم إرسال رابط تأكيد للبريد الجديد، افتحه لإتمام التغيير');
      }catch(err){
        toast(err.message || 'تعذّر تحديث البريد', 'error');
      }
    });

    document.getElementById('savePassBtn').addEventListener('click', async ()=>{
      const newPass = document.getElementById('settingsPassInput').value;
      if(!newPass){ toast('اكتب كلمة مرور جديدة أولاً', 'error'); return; }
      if(newPass.length < 6){ toast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error'); return; }
      try{
        await updateAccountPassword(newPass);
        document.getElementById('settingsPassInput').value = '';
        toast('تم تحديث كلمة المرور بنجاح');
      }catch(err){
        toast(err.message || 'تعذّر تحديث كلمة المرور', 'error');
      }
    });
  }

  const editNameBtn = document.getElementById('editNameBtn');
  const editNameRow = document.getElementById('editNameRow');
  const editNameInput = document.getElementById('editNameInput');
  const accountHint = document.getElementById('accountHint');
  editNameBtn.addEventListener('click', ()=>{
    editNameInput.value = document.getElementById('accountName').textContent;
    editNameRow.style.display = 'flex';
    accountHint.style.display = 'none';
    editNameBtn.style.display = 'none';
    editNameInput.focus();
  });
  document.getElementById('cancelNameBtn').addEventListener('click', ()=>{
    editNameRow.style.display = 'none';
    accountHint.style.display = 'block';
    editNameBtn.style.display = 'flex';
  });
  document.getElementById('saveNameBtn').addEventListener('click', async ()=>{
    const newName = editNameInput.value.trim();
    if(!newName){ toast('الرجاء إدخال اسم صحيح', 'error'); return; }
    await updateProfile({ name: newName });
    document.getElementById('accountName').textContent = newName;
    editNameRow.style.display = 'none';
    accountHint.style.display = 'block';
    editNameBtn.style.display = 'flex';
    toast('تم تحديث اسمك');
  });

  document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    await logout();
    location.href = 'index.html';
  });

  document.getElementById('avatarBtn').addEventListener('click', ()=> document.getElementById('avatarInput').click());
  document.getElementById('avatarInput').addEventListener('change', function(){
    const file = this.files[0];
    this.value = '';
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = async ()=>{
        const size = 240;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(size/img.width, size/img.height);
        const w = img.width*scale, h = img.height*scale;
        ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        const blob = await (await fetch(dataUrl)).blob();
        const url = await uploadMedia(blob, `${user.id}/avatar.jpg`, 'image/jpeg');
        await updateProfile({ avatar: url });
        document.getElementById('avatarImg').src = url;
        toast('تم تحديث صورتك الشخصية');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  function myAdCardHTML(ad){
    const expired = isExpired(ad);
    return `<div class="my-ad-card" style="margin-bottom:16px;">
      ${expired ? `<p class="field-hint" style="background:var(--primary-light);color:var(--muted);margin-bottom:8px;">هذا الإعلان منتهي الصلاحية ولا يظهر للزوار — جدّد نشره ليعود للظهور.</p>` : ''}
      ${adCardHTML(ad)}
      <div class="owner-actions" style="display:flex;gap:8px;margin-top:8px;">
        ${expired ? `<button class="btn btn-primary" type="button" data-renew="${ad.id}">تجديد النشر</button>` : ''}
        <a class="btn btn-primary" href="add-ad.html?edit=${ad.id}">تعديل</a>
        <button class="btn btn-outline" type="button" data-delete="${ad.id}" style="color:var(--danger);border-color:var(--danger);">حذف</button>
      </div>
    </div>`;
  }

  async function renderMyAds(){
    const mine = await getAdsByOwner(user.id);
    const mount = document.getElementById('myAds');
    mount.innerHTML = mine.length
      ? mine.map(myAdCardHTML).join('')
      : `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
          <h3>لم تنشر أي إعلان بعد</h3>
          <p>ابدأ الآن وأضف أول إعلان لك.</p>
          <a class="btn btn-primary" href="add-ad.html" style="margin-top:12px;">أضف إعلانك</a>
        </div>`;
  }
  await renderMyAds();

  document.getElementById('myAds').addEventListener('click', async e=>{
    const delBtn = e.target.closest('[data-delete]');
    if(delBtn){
      if(confirm('هل أنت متأكد من حذف هذا الإعلان؟')){
        await deleteAd(delBtn.dataset.delete);
        await renderMyAds();
        toast('تم حذف الإعلان');
      }
      return;
    }
    const renewBtn = e.target.closest('[data-renew]');
    if(renewBtn){
      await renewAd(renewBtn.dataset.renew);
      await renderMyAds();
      toast('تم تجديد نشر الإعلان');
    }
  });

  async function renderFavorites(){
    const favs = await getFavoriteAds();
    const mount = document.getElementById('favAds');
    mount.innerHTML = favs.length
      ? favs.map(adCardHTML).join('')
      : `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 21s-7.5-4.7-10-9.3C.4 8 2 4.5 5.6 4c2-.3 3.8.7 4.9 2.4C11.6 4.7 13.4 3.7 15.4 4c3.6.5 5.2 4 3.6 7.7C16.5 16.3 12 21 12 21Z"/></svg>
          <h3>لا توجد إعلانات مفضلة بعد</h3>
          <p>اضغط على أيقونة القلب في أي إعلان لإضافته هنا.</p>
        </div>`;
  }
  await renderFavorites();

  document.getElementById('favAds').addEventListener('click', e=>{
    const btn = e.target.closest('.fav-btn');
    if(!btn) return;
    if(!btn.classList.contains('active')) btn.closest('.ad-card').remove();
  });
})();
</script>
</body>
</html>
