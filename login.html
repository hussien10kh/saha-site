<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | ساحة</title>
<meta name="description" content="سجّل دخولك أو أنشئ حساباً جديداً على ساحة للبدء بنشر إعلاناتك والتواصل مع المهتمين.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#15264a">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ساحة">
</head>
<body>

<div id="site-header"></div>

<main class="page-body">
  <div class="auth-wrap panel">
    <div class="auth-tabs">
      <button class="active" id="tabLogin">تسجيل الدخول</button>
      <button id="tabSignup">حساب جديد</button>
      <button id="tabGuest">كضيف</button>
    </div>
    <form id="authForm">
      <div class="field full" id="nameField" style="display:none;">
        <label>الاسم الكامل</label>
        <input type="text" id="nameInput" placeholder="مثال: أبو محمد">
      </div>
      <div class="field full" id="contactField">
        <label>البريد الإلكتروني</label>
        <input type="email" id="contactInput" placeholder="example@email.com">
      </div>
      <div class="field full" id="guestPhoneField" style="display:none;">
        <label>رقم الجوال</label>
        <input type="tel" id="guestPhoneInput" placeholder="09xx xxx xxx">
      </div>
      <div class="field full" id="passField">
        <label>كلمة المرور</label>
        <div style="position:relative;">
          <input type="password" id="passInput" placeholder="••••••••" minlength="6" style="padding-left:44px;">
          <button type="button" id="togglePassBtn" aria-label="إظهار كلمة المرور" style="position:absolute;left:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:none;background:none;display:flex;align-items:center;justify-content:center;color:var(--muted);">
            <svg id="togglePassIcon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field full" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <input type="checkbox" id="rememberMe" checked style="width:16px;height:16px;">
        <label for="rememberMe" style="margin:0;font-weight:600;font-size:13.5px;">تذكرني على هذا الجهاز</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="authSubmit">تسجيل الدخول</button>
    </form>

    <div style="display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted-2);font-size:13px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>أو<div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <button type="button" class="btn btn-outline btn-block btn-lg" id="googleBtn" style="gap:10px;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.8-.1-1.5-.2-2.2H12v4.3h5.9c-.3 1.4-1 2.5-2.2 3.3v2.7h3.6c2.1-1.9 3.2-4.8 3.2-8.1Z"/><path fill="#34A853" d="M12 23c3 0 5.4-1 7.3-2.7l-3.6-2.7c-1 .7-2.2 1.1-3.7 1.1-2.9 0-5.3-1.9-6.1-4.5H2.2v2.8C4.1 20.5 7.8 23 12 23Z"/><path fill="#FBBC05" d="M5.9 14.2c-.2-.7-.3-1.4-.3-2.2s.1-1.5.3-2.2V7H2.2C1.4 8.6 1 10.3 1 12s.4 3.4 1.2 5l3.7-2.8Z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3.1.6 4.2 1.7l3.2-3.2C17.4 2 15 1 12 1 7.8 1 4.1 3.5 2.2 7l3.7 2.8c.8-2.6 3.2-4.4 6.1-4.4Z"/></svg>
      <span>الدخول عبر جوجل</span>
    </button>

    <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:16px;">
      حسابك محفوظ فعلياً وتقدر تسجّل دخولك فيه من أي جهاز.
    </p>
  </div>
</main>

<div id="site-footer"></div>
<div id="mobile-nav"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>
<script>
  (async()=>{
    await renderHeader('');
    renderFooter();
    renderMobileNav('');
  })();

  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const tabGuest = document.getElementById('tabGuest');
  const nameField = document.getElementById('nameField');
  const contactField = document.getElementById('contactField');
  const passField = document.getElementById('passField');
  const guestPhoneField = document.getElementById('guestPhoneField');
  const submitBtn = document.getElementById('authSubmit');
  let activeTab = 'login';

  function setActiveTab(tab){
    activeTab = tab;
    [tabLogin, tabSignup, tabGuest].forEach(t=>t.classList.remove('active'));
    nameField.style.display = (tab==='signup' || tab==='guest') ? 'block' : 'none';
    contactField.style.display = (tab==='login' || tab==='signup') ? 'block' : 'none';
    passField.style.display = (tab==='login' || tab==='signup') ? 'block' : 'none';
    guestPhoneField.style.display = tab==='guest' ? 'block' : 'none';
    if(tab==='login'){ tabLogin.classList.add('active'); submitBtn.textContent='تسجيل الدخول'; }
    if(tab==='signup'){ tabSignup.classList.add('active'); submitBtn.textContent='إنشاء حساب'; }
    if(tab==='guest'){ tabGuest.classList.add('active'); submitBtn.textContent='متابعة كضيف'; }
  }
  tabLogin.addEventListener('click', ()=> setActiveTab('login'));
  tabSignup.addEventListener('click', ()=> setActiveTab('signup'));
  tabGuest.addEventListener('click', ()=> setActiveTab('guest'));

  const passInput = document.getElementById('passInput');
  const togglePassBtn = document.getElementById('togglePassBtn');
  const togglePassIcon = document.getElementById('togglePassIcon');
  const EYE_OPEN = togglePassIcon.innerHTML;
  const EYE_CLOSED = '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/><path d="m4 4 16 16"/>';
  togglePassBtn.addEventListener('click', ()=>{
    const show = passInput.type === 'password';
    passInput.type = show ? 'text' : 'password';
    togglePassIcon.innerHTML = show ? EYE_CLOSED : EYE_OPEN;
    togglePassBtn.setAttribute('aria-label', show ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
  });

  function isValidEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
  function isValidSyrianPhone(v){ return /^0?9\d{8}$/.test(normalizePhone(v)); }

  function goToRedirect(){
    const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
    setTimeout(()=> location.href = redirect, 600);
  }

  document.getElementById('authForm').addEventListener('submit', async e=>{
    e.preventDefault();
    setRememberPref(document.getElementById('rememberMe').checked);

    if(activeTab === 'guest'){
      const nameVal = document.getElementById('nameInput').value.trim();
      const phone = normalizePhone(document.getElementById('guestPhoneInput').value);
      if(!nameVal){
        toast('الرجاء إدخال اسمك', 'error');
        return;
      }
      if(!isValidSyrianPhone(phone)){
        toast('الرجاء إدخال رقم جوال سوري صحيح', 'error');
        return;
      }
      try{
        await signInAsGuest(nameVal, phone);
        toast('تم المتابعة كضيف بنجاح');
        goToRedirect();
      }catch(err){
        toast('تعذّرت المتابعة كضيف، حاول مجدداً', 'error');
      }
      return;
    }

    const contact = document.getElementById('contactInput').value.trim();
    const pass = document.getElementById('passInput').value;
    const nameVal = document.getElementById('nameInput').value.trim();

    if(!contact || !isValidEmail(contact)){
      toast('الرجاء إدخال بريد إلكتروني صحيح', 'error');
      return;
    }
    if(!pass || pass.length < 6){
      toast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
      return;
    }

    try{
      if(activeTab === 'signup'){
        const data = await signUpWithEmail(contact, pass, nameVal || emailPrefix(contact));
        if(!data.session){
          toast('تم إنشاء حسابك! افتح بريدك الإلكتروني واضغط رابط التفعيل حتى تقدر تسجّل الدخول.');
          return; // no session yet — nothing to redirect into
        }
        toast('تم إنشاء حسابك بنجاح');
      } else {
        await signInWithEmail(contact, pass);
        toast('تم تسجيل الدخول بنجاح');
      }
      goToRedirect();
    }catch(err){
      const FRIENDLY = {
        'Invalid login credentials': 'البريد الإلكتروني أو كلمة المرور غير صحيحة',
        'Email not confirmed': 'لازم تفعّل بريدك أولاً — تحقق من صندوق الوارد واضغط رابط التفعيل.',
        'User already registered': 'هذا البريد مسجّل مسبقاً، جرّب تسجيل الدخول بدلاً من إنشاء حساب.',
      };
      toast(FRIENDLY[err.message] || err.message || 'حدث خطأ، حاول مجدداً', 'error');
    }
  });

  /* Google sign-in: fully wired to Google Identity Services, but needs a
     real OAuth Client ID (created in Google Cloud Console, authorized for
     this site's domain) before it can actually authenticate anyone. Once
     configured, it signs the user into Supabase via the Google ID token. */
  const GOOGLE_CLIENT_ID = '212224115105-3qjssjv7ei3p637ld6en88qdmgj421ee.apps.googleusercontent.com';
  document.getElementById('googleBtn').addEventListener('click', ()=>{
    if(GOOGLE_CLIENT_ID.startsWith('TODO')){
      toast('تسجيل الدخول عبر جوجل يحتاج إعداد Client ID أولاً', 'error');
      return;
    }
    setRememberPref(document.getElementById('rememberMe').checked);
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: async (response)=>{
        const { data, error } = await sb.auth.signInWithIdToken({ provider:'google', token: response.credential });
        if(error){ toast('تعذّر تسجيل الدخول عبر جوجل', 'error'); return; }
        // first Google login for this account — profiles.name starts empty,
        // so fill it from Google's own name (never leave it as the raw email)
        const { data: profile } = await sb.from('profiles').select('name').eq('id', data.user.id).maybeSingle();
        if(!profile || !profile.name){
          const meta = data.user.user_metadata || {};
          const googleName = meta.full_name || meta.name || emailPrefix(data.user.email);
          const googleAvatar = meta.avatar_url || meta.picture || null;
          await updateProfile({ name: googleName, avatar: googleAvatar });
        }
        toast('تم تسجيل الدخول عبر جوجل بنجاح');
        goToRedirect();
      },
    });
    google.accounts.id.prompt();
  });
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
